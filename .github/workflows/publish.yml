name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      # This permission is required for Trusted Publishing (OIDC)
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build binary wheels and source tarball
      run: python -m build

    - name: Publish package to PyPI
      uses: pypa/github-action-pypi-publish@v1.9.0